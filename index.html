<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./style.css">
    <title>Flexible Dashboard</title>
</head>

<body>
    <header>
        <a href="">
            <img src="./assets/images/logo.png" alt="Logo">
        </a>

        <nav>
            <a href="">Home</a>
            <a href="">About</a>
            <a href="">Contact</a>
            <a href="">Services</a>
        </nav>
    </header>

    <main>
        <aside>
            <ul>
                <li>
                    <i class="fa-solid fa-house"></i>
                    <span>Dashboard</span>
                </li>
                <li>
                    <i class="fa-solid fa-user"></i>
                    <span>Profile</span>
                </li>
                <li>
                    <i class="fa-solid fa-gear"></i>
                    <span>Settings</span>
                </li>
            </ul>
        </aside>
        <section>
            <div class="card">
                <img src="./assets/images/cardImg1.webp" alt="Card Image">
                <p>San Francisco</p>
                <span>Premium economy</span>
                <button>Book flight</button>
            </div>
            <div class="card">
                <img src="./assets/images/cardImg2.webp" alt="Card Image">
                <p>New York</p>
                <span>Premium economy</span>
                <button>Book flight</button>
            </div>
            <div class="card">
                <img src="./assets/images/cardImg3.webp" alt="Card Image">
                <p>Dubai</p>
                <span>Premium economy</span>
                <button>Book flight</button>
            </div>
            <div class="card">
                <img src="./assets/images/cardImg4.webp" alt="Card Image">
                <p>Australia</p>
                <span>Premium economy</span>
                <button>Book flight</button>
            </div>
            <div class="card">
                <img src="./assets/images/cardImg5.webp" alt="Card Image">
                <p>Tokyo</p>
                <span>Premium economy</span>
                <button>Book flight</button>
            </div>
            <div class="card">
                <img src="./assets/images/cardImg6.webp" alt="Card Image">
                <p>Vietnam</p>
                <span>Premium economy</span>
                <button>Book flight</button>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026</p>
        <div>
            <a href="">
                <i class="fa-brands fa-discord"></i>
            </a>
            <a href="">
                <i class="fa-brands fa-tiktok"></i>
            </a>
            <a href="">
                <i class="fa-brands fa-linkedin"></i>
            </a>
        </div>
    </footer>
</body>

</html>
