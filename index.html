<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./style.css">
    <title>Flexible Dashboard</title>
</head>

<body>
    <header>
        <a href="">
            <img src="./assets/images/logo.png" alt="Logo" width="50" height="50">
        </a>

        <nav>
            <a href="">Home</a>
            <a href="">About</a>
            <a href="">Contact</a>
            <a href="">Services</a>
        </nav>
    </header>

    <main>
        <aside>
            <ul>
                <li>Dashboard</li>
                <li>Profile</li>
                <li>Settings</li>
            </ul>
        </aside>
        <section>

        </section>
        <div>
            <div class="card-1">
               
                <img class="nike-shoe" src="assets/images/nike.jpg" alt="Nike Shoe">
                <div class="card-content">
                    <h3 class="product-title">Nike Shoe</h3>
                    <div class="price-row">
                        <span class="price">N500.000</span>
                        <span class="old-price">N550.000</span>
                    </div>
                    <button class="add-btn">Add to Cart</button>
                </div>
            </div>
            <div class="card-2">
            
                <img class="T-shirt" src="assets/images/tshirt.jpg" alt="tshirt">
                <div class="card-content-2">
                    <h3 class="product-title-2">T-shirt</h3>
                    <div class="price-row-2">
                        <span class="price-2">N500.000</span>
                        <span class="old-price-2">N550.000</span>
                    </div>
                    <button class="add-btn">Add to Cart</button>
                </div>
            </div>
        <div class="card-3">
        
            <img class="laptop" src="assets/images/macbook.jpg" alt="laptop">
            <div class="card-content-3">
                <h3 class="product-title-3">Mac Book</h3>
                <div class="price-row-3">
                    <span class="price-3">N500.000</span>
                    <span class="old-price-3">N550.000</span>
                </div>
                <button class="add-btn">Add to Cart</button>
            </div>
        </div>
        <div class="card-4">
        
            <img class="I-phone" src="assets/images/iphone.jpg" alt="iphone">
            <div class="card-content-4">
                <h3 class="product-title-4">Iphone 16</h3>
                <div class="price-row-4">
                    <span class="price-4">N500.000</span>
                    <span class="old-price-4">N550.000</span>
                </div>
                <button class="add-btn">Add to Cart</button>
            </div>
        </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026</p>
        <div>
            <a href="">
                <i class="fa-brands fa-discord"></i>
            </a>
            <a href="">
                <i class="fa-brands fa-tiktok"></i>
            </a>
            <a href="">
                <i class="fa-brands fa-linkedin"></i>
            </a>
        </div>
    </footer>
</body>

</html>
